services:
  - type: web
    name: searchwilds-web
    runtime: python
    plan: starter
    region: oregon
    buildCommand: bash build.sh
    startCommand: gunicorn searchwilds.wsgi:application
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

  - type: cron
    name: searchwilds-youtube-batch
    runtime: python
    plan: starter
    region: oregon
    schedule: "0 3 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py load_animal_content --skip-imports --skip-with-videos --batch-size 10 --offset 0 --limit 3 --delay-seconds 2
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
